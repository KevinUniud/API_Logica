version: "3.3"

services:
  testlogica-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testlogica-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
